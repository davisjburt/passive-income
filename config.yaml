# ------------------------------------------------------------------
# Trading bot configuration. Edit these by hand; no code changes needed.
# Strategy: RSI(2) mean reversion on liquid ETFs, long-only, no margin.
# Profile: FULLY INVESTED / higher-yield (intentionally more aggressive;
# this is a satellite risk bucket, not the main S&P account).
# ------------------------------------------------------------------

# Liquid ETFs. Broad indexes + liquid sector ETFs so more setups fire at once
# (more time invested). Sector ETFs add risk vs. broad-only — that's the point here.
universe:
  - SPY   # S&P 500
  - QQQ   # Nasdaq 100
  - IWM   # Russell 2000 (small caps)
  - DIA   # Dow 30
  - EFA   # Developed intl
  - EEM   # Emerging markets
  - XLK   # Technology
  - SMH   # Semiconductors
  - XLF   # Financials
  - XLE   # Energy
  - XLV   # Health care
  - XLY   # Consumer discretionary

strategy:
  bar_timeframe: "15Min" # 15-minute bars for intraday signals
  rsi_period: 14       # RSI(14) is standard for intraday; RSI(2) is too noisy on sub-daily bars
  rsi_entry: 30.0      # classic oversold threshold for RSI(14)
  rsi_exit: 65.0       # sell when RSI recovers above this
  trend_sma: 200       # 200 × 15min ≈ 10 trading days — keeps the long-term bias filter
  exit_sma: 20         # 20 × 15min ≈ 5 hours — sell if price reclaims short-term average
  max_hold_days: 3     # time-stop: exit after 3 calendar days (intraday positions turn faster)

risk:
  max_positions: 5         # max concurrent holdings
  max_position_pct: 0.25   # cap each position at this fraction of equity
  cash_buffer_pct: 0.02    # keep ~fully invested (tiny buffer avoids order rejections)
  stop_loss_pct: 0.08      # hard stop: exit if down this much from entry
  daily_loss_halt_pct: 0.05  # if equity drops this much on the day, no new buys
  use_margin: false        # NEVER borrow. Leave false.

execution:
  order_type: market       # market orders on liquid ETFs
  time_in_force: day
  lookback_days: 30        # 30 calendar days → ~550 15-min bars, well above trend_sma=200
