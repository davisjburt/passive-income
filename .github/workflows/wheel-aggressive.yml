name: wheel-aggressive

on:
  schedule:
    # Fallback cron — the Cloudflare Worker is the reliable 5-min trigger.
    # GitHub cron is best-effort and may be coalesced; keep it as a safety net.
    - cron: "*/5 13-21 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: wheel-aggressive
  # false = don't cancel the running job when a new trigger arrives.
  # GitHub queues the newcomer and discards any older queued run, so queue
  # depth is always ≤ 1. Cancelling mid-run risks interrupting an order
  # submission, which is worse than a brief delay.
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  wheel-aggressive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run aggressive wheel cycle (live paper, $100k account)
        env:
          ALPACA_AGGRESSIVE_API_KEY: ${{ secrets.ALPACA_AGGRESSIVE_API_KEY }}
          ALPACA_AGGRESSIVE_API_SECRET: ${{ secrets.ALPACA_AGGRESSIVE_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python wheel_run.py --live --config config.wheel.aggressive.yaml --account aggressive

      - name: Commit wheel ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/wheel_ledger_aggressive.json docs/wheel_aggressive.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: update aggressive wheel ledger"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i), rebasing onto latest main and retrying..."
            git fetch origin main
            git rebase origin/main
          done
          echo "::error::Failed to push wheel ledger after retries."
          exit 1
