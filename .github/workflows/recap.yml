name: wheel-recap

# The single owner of the "market open" / "market closed" Telegram recap
# covering every account in bot/wheel/accounts.py. Deliberately its own
# workflow, decoupled from wheel.yml / wheel-aggressive.yml: those keep doing
# their own trading and their own per-trade alerts, this only ever decides
# "is the market open right now" and reports on all accounts at once. Adding
# a new account means adding its secrets below and registering it in
# bot/wheel/accounts.py -- the trading workflows never need to change.

on:
  schedule:
    # Fallback cron — the Cloudflare Worker is the reliable 5-min trigger.
    # GitHub cron is best-effort and may be coalesced; keep it as a safety net.
    - cron: "*/5 13-21 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: wheel-recap
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  recap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Send market open/close recap
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_AGGRESSIVE_API_KEY: ${{ secrets.ALPACA_AGGRESSIVE_API_KEY }}
          ALPACA_AGGRESSIVE_API_SECRET: ${{ secrets.ALPACA_AGGRESSIVE_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_recap.py

      - name: Commit recap state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/recap_state.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: update recap state"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i), rebasing onto latest main and retrying..."
            git fetch origin main
            git rebase origin/main
          done
          echo "::error::Failed to push recap state after retries."
          exit 1
