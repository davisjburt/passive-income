name: trade

on:
  schedule:
    # 19:30 UTC, Mon-Fri. That's ~30 min before the US close during summer
    # (EDT) and ~90 min before during winter (EST). GitHub may delay cron runs
    # by a few minutes; the bot checks the market clock and no-ops if closed.
    - cron: "30 19 * * 1-5"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

concurrency:
  group: trade
  cancel-in-progress: false

permissions:
  contents: write   # allow committing the refreshed dashboard data back

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run trading cycle (also refreshes docs/data.json)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py

      - name: Commit dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update dashboard data"
            git push
          fi
