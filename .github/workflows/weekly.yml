name: weekly

on:
  schedule:
    # 21:30 UTC Friday — safely after the US close in both EDT (16:00=20:00 UTC)
    # and EST (16:00=21:00 UTC). GitHub may delay cron a few minutes; that's fine.
    - cron: "30 21 * * 5"
  workflow_dispatch: {}

concurrency:
  group: weekly
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Cancel outstanding orders + generate weekly report
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: python weekly.py

      - name: Commit report + dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reports docs/data.json
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: weekly report $(date -u +%Y-%m-%d)"
            git push
          fi
