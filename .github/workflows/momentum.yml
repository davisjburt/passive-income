name: momentum

# Unlike the wheel accounts, this strategy only acts once a month, so it runs
# once a day (not every 5 min) -- momentum_run.py itself no-ops on every call
# except the first one in a new calendar month. No Cloudflare Worker needed:
# a single daily best-effort GitHub cron is plenty reliable at this frequency
# (the 5-min case needed the Worker specifically because GitHub's own cron
# gets coalesced/dropped often at short intervals -- daily doesn't have that
# problem).

on:
  schedule:
    - cron: "30 14 * * 1-5"  # ~10:30am ET (14:30 UTC), safely after the 9:30am open
  workflow_dispatch: {}

concurrency:
  group: momentum
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  momentum:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run momentum cycle (live paper)
        env:
          ALPACA_MOMENTUM_API_KEY: ${{ secrets.ALPACA_MOMENTUM_API_KEY }}
          ALPACA_MOMENTUM_API_SECRET: ${{ secrets.ALPACA_MOMENTUM_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python momentum_run.py --live

      - name: Commit momentum state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/momentum_state_momentum.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: update momentum state"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i), rebasing onto latest main and retrying..."
            git fetch origin main
            git rebase origin/main
          done
          echo "::error::Failed to push momentum state after retries."
          exit 1
