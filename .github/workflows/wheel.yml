name: wheel

on:
  schedule:
    # Every 15 min during ~US market hours (13-21 UTC covers EDT + EST). The
    # engine no-ops when the market is closed and is idempotent against pending
    # orders, so frequent runs won't place duplicates. NOTE: GitHub cron is best
    # effort and often delayed/coalesced under load — 15 min is about the finest
    # interval it runs reliably; don't expect true 5-min precision here.
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: wheel
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  wheel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run wheel cycle (live paper)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python wheel_run.py --live

      - name: Commit wheel ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/wheel_ledger.json
          if git diff --cached --quiet; then
            echo "No ledger changes."
          else
            git commit -m "chore: update wheel ledger"
            git push
          fi
