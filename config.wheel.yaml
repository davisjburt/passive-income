# ------------------------------------------------------------------
# Options WHEEL config — MAXIMUM AGGRESSION (paper trading experiment).
#
# Goals: deploy nearly all capital, maximize premium income, use high-IV
# names with short DTE and near-ATM strikes. Assignment is fine — we
# just spin the wheel faster. No risk guardrails: this is intentional.
# ------------------------------------------------------------------

enabled: true

# High-IV, low-to-mid priced names with liquid options.
# MARA/RIOT: crypto miners, IV often 100-200%+
# AMC/SOFI/NIO: meme/growth, high IV
# F/AAL/CLF/VALE: volatile industrials/airlines
# SNDL: cannabis, IV regularly 150%+
universe:
  - MARA   # Marathon Digital (crypto miner)
  - RIOT   # Riot Platforms (crypto miner)
  - AMC    # AMC Entertainment
  - SOFI   # SoFi Technologies
  - NIO    # NIO
  - F      # Ford
  - AAL    # American Airlines
  - SNDL   # Sundial Growers
  - CLF    # Cleveland-Cliffs
  - VALE   # Vale

max_wheel_tickers: 8           # spread across up to 8 names at once
per_stock_cap_pct: 0.25        # up to 25% per position ($2,500 on $10k)
portfolio_wheel_cap_pct: 0.95  # deploy 95% of the account

put:
  otm_pct: [0.02, 0.08]        # 2-8% OTM — near ATM for maximum premium
  dte: [7, 21]                 # short DTE for fast theta decay
  min_annual_yield: 0.20       # 20%+ annualized (easily cleared with high-IV names)

call:
  otm_above_basis_pct: [0.02, 0.05]  # tight — maximize call premium after assignment
  dte: [7, 21]
  min_annual_yield: 0.20

safeguards:
  halt_new_puts_drawdown_pct: 1.0    # effectively disabled — no drawdown halt
  order_type: limit                  # always limit orders on options (wide spreads)
  limit_slippage_pct: 0.01           # 1% below bid (tighter, fills faster)
