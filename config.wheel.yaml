# ------------------------------------------------------------------
# Options WHEEL config — REAL-MONEY INCOME profile.
#
# Philosophy: sell premium on quality names that won't go to zero.
# Conservative OTM + longer DTE = smaller premium but far lower
# assignment risk. This is the strategy to validate before funding
# a real account.
#
# NOTE: SPY/QQQ/AAPL are ideal but too expensive for $10k (one
# contract = $40-50k notional). These names are affordable quality
# proxies. With a real $100k+ account, replace with SPY, QQQ, AAPL,
# MSFT, NVDA — same parameters.
# ------------------------------------------------------------------

enabled: true

# Quality names affordable on $10k (one contract fits ~15-25% of equity).
# T: stable telecom, low IV, classic income stock
# PFE: large pharma, beaten down = elevated IV
# F: large-cap auto, liquid options, moderate IV
# KEY: KeyCorp regional bank, dividend-paying, stable
# SOFI: fintech, higher IV for some extra premium
universe:
  - T      # AT&T  (~$21, contract ~$1,900)
  - PFE    # Pfizer (~$24, contract ~$2,200)
  - F      # Ford  (~$14, contract ~$1,300)
  - KEY    # KeyCorp (~$23, contract ~$2,100)
  - SOFI   # SoFi (~$18, contract ~$1,600)

max_wheel_tickers: 4           # 4 × ~$2k ≈ 80% deployed (within portfolio cap)
per_stock_cap_pct: 0.25        # 25% per position
portfolio_wheel_cap_pct: 0.70  # keep 30% cash — never fully deployed on real money

put:
  otm_pct: [0.10, 0.15]        # 10-15% OTM — meaningful buffer before assignment
  dte: [30, 45]                # 30-45 DTE — peak theta decay zone
  min_annual_yield: 0.08       # 8%+ annualized (realistic for quality names)

call:
  otm_above_basis_pct: [0.05, 0.10]  # 5-10% above basis — room for stock to run
  dte: [30, 45]
  min_annual_yield: 0.08

safeguards:
  halt_new_puts_drawdown_pct: 0.15   # stop new puts if underlying down 15% from entry
  order_type: limit                  # always limit on options
  limit_slippage_pct: 0.02
