<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Davis's Wheel Dashboard</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e10" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wheel" />
    <style>
      :root {
        --bg: #fafafa;
        --card: #ffffff;
        --border: #ececec;
        --text: #1a1a1a;
        --muted: #8a8a8a;
        --pos: #16a34a;
        --neg: #dc2626;
        --accent: #1a1a1a;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e0e10;
          --card: #161618;
          --border: #262629;
          --text: #f2f2f2;
          --muted: #8c8c92;
          --pos: #4ade80;
          --neg: #f87171;
          --accent: #f2f2f2;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.45;
      }
      .wrap {
        max-width: 880px;
        margin: 0 auto;
        padding: calc(32px + env(safe-area-inset-top))
                 calc(20px + env(safe-area-inset-right))
                 calc(64px + env(safe-area-inset-bottom))
                 calc(20px + env(safe-area-inset-left));
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 28px;
      }
      h1 { font-size: 18px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
      .status {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12.5px;
        color: var(--muted);
      }
      .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--muted);
      }
      .dot.open {
        background: var(--pos);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--pos) 20%, transparent);
      }

      .switcher {
        display: flex;
        gap: 4px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 24px;
      }
      .switcher-btn {
        flex: 1;
        border: none;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
        padding: 9px 12px;
        border-radius: 7px;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s, color 0.15s;
      }
      .switcher-btn:hover { color: var(--text); }
      .switcher-btn.active {
        background: var(--accent);
        color: var(--bg);
      }

      .hero { margin-bottom: 28px; }
      .hero .label { font-size: 12.5px; color: var(--muted); margin-bottom: 4px; }
      .hero .value { font-size: 40px; font-weight: 650; letter-spacing: -0.02em; }
      .hero .sub { font-size: 14px; margin-top: 2px; }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 28px;
      }
      @media (max-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
      .kpi {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .kpi .label {
        font-size: 11.5px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .kpi .num { font-size: 19px; font-weight: 600; margin-top: 5px; letter-spacing: -0.01em; }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .card h2 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 16px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .section-label {
        font-size: 11.5px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin: 16px 0 8px;
      }
      .section-label:first-child { margin-top: 0; }

      table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
      th {
        text-align: right;
        font-weight: 500;
        color: var(--muted);
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 0 0 10px 16px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      th:first-child, td:first-child { text-align: left; padding-left: 0; }
      td {
        padding: 11px 0 11px 16px;
        border-bottom: 1px solid var(--border);
        text-align: right;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      tr:last-child td { border-bottom: none; }
      .sym { font-weight: 600; }
      .pos { color: var(--pos); }
      .neg { color: var(--neg); }
      .empty { color: var(--muted); font-size: 13.5px; padding: 8px 0; }
      .badge {
        display: inline-block;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 2px 7px;
        border-radius: 5px;
        background: var(--border);
        color: var(--muted);
      }
      .badge.put  { background: color-mix(in srgb, var(--pos) 12%, transparent); color: var(--pos); }
      .badge.call { background: color-mix(in srgb, var(--neg) 12%, transparent); color: var(--neg); }
      .badge.stock { background: color-mix(in srgb, #888 12%, transparent); color: var(--text); }
      .badge.pending { background: color-mix(in srgb, #f59e0b 15%, transparent); color: #d97706; }
      tr.divider td {
        padding: 6px 0 4px;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        text-align: left;
      }
      tr.orphaned td { opacity: 0.65; }

      .spark-cell { padding-left: 16px; }
      .spark-cell svg { display: block; margin-left: auto; }

      #wheel-table, #pending-table, #positions-table { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      .updated { font-size: 12px; color: var(--muted); margin-top: 28px; text-align: center; }
      .disclaimer { font-size: 11.5px; color: var(--muted); text-align: center; margin-top: 8px; line-height: 1.5; }
      a { color: inherit; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Davis's Wheel Dashboard</h1>
        <div class="status">
          <span id="dot" class="dot"></span><span id="market">—</span>
        </div>
      </header>

      <div class="switcher" id="switcher">
        <button class="switcher-btn active" data-account="default">Conservative · $10k</button>
        <button class="switcher-btn" data-account="aggressive">Aggressive · $100k</button>
      </div>

      <div class="hero">
        <div class="label">Account equity</div>
        <div class="value" id="equity">—</div>
        <div class="sub" id="dayChange">—</div>
      </div>

      <div class="grid">
        <div class="kpi">
          <div class="label">Exposure</div>
          <div class="num" id="kpi-exposure">—</div>
        </div>
        <div class="kpi">
          <div class="label">Premium collected</div>
          <div class="num" id="kpi-premium">—</div>
        </div>
        <div class="kpi">
          <div class="label">Net option P/L</div>
          <div class="num" id="kpi-pnl">—</div>
        </div>
        <div class="kpi">
          <div class="label">Cash</div>
          <div class="num" id="kpi-cash">—</div>
        </div>
      </div>

      <div class="card">
        <h2>Live prices</h2>
        <div id="prices-table"><div class="empty">Loading…</div></div>
      </div>

      <div class="card">
        <h2>Wheel — per symbol</h2>
        <div id="wheel-table"><div class="empty">Loading…</div></div>
      </div>

      <div class="card" id="pending-card" style="display:none">
        <h2>Pending orders</h2>
        <div id="pending-table"></div>
      </div>

      <div class="card" id="positions-card" style="display:none">
        <h2>Open option positions</h2>
        <div id="positions-table"></div>
      </div>

      <div class="updated" id="updated">Loading…</div>
      <div class="disclaimer">
        Paper-trading account. Automated and experimental — not investment advice.
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const money = (n) => "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const signed = (n) => (n >= 0 ? "+" : "−") + money(Math.abs(n));
      const cls = (n) => (n > 0 ? "pos" : n < 0 ? "neg" : "");
      const pct = (n) => (n >= 0 ? "+" : "") + Number(n).toFixed(2) + "%";

      const STATE_BADGE = {
        "CASH":          "",
        "PUT_OPEN":      '<span class="badge put">PUT</span>',
        "LONG_STOCK":    '<span class="badge stock">STOCK</span>',
        "CALL_OPEN":     '<span class="badge call">CALL</span>',
        "ORDER_PENDING": '<span class="badge pending">PENDING</span>',
      };

      let wheelSymbols = []; // populated from wheel.json, used to fetch /api/prices
      let currentAccount = localStorage.getItem("wheelAccount") || "default";

      function wheelFileFor(account) {
        return account === "default" ? "wheel.json" : `wheel_${account}.json`;
      }

      function sparkline(values) {
        if (!values || values.length < 2) return '<span style="color:var(--muted)">—</span>';
        const w = 72, h = 24, pad = 2;
        const lo = Math.min(...values), hi = Math.max(...values);
        const span = hi - lo || 1;
        const step = (w - pad * 2) / (values.length - 1);
        const pts = values.map((v, i) =>
          `${(pad + i * step).toFixed(1)},${(h - pad - ((v - lo) / span) * (h - pad * 2)).toFixed(1)}`
        ).join(" ");
        const up = values[values.length - 1] >= values[0];
        const color = up ? "var(--pos)" : "var(--neg)";
        return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
          <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6"
            stroke-linejoin="round" stroke-linecap="round"/>
        </svg>`;
      }

      function renderWheel(d) {
        $("kpi-premium").textContent = money(d.total_premium_collected);
        const pnl = d.total_realized_pnl || 0;
        $("kpi-pnl").innerHTML = `<span class="${cls(pnl)}">${signed(pnl)}</span>`;

        // Per-symbol table — split into active universe and orphaned (old config)
        const syms = d.symbols || [];
        wheelSymbols = syms.map((s) => s.symbol);
        if (syms.length) {
          const active   = syms.filter((s) => !s.orphaned);
          const orphaned = syms.filter((s) => s.orphaned);
          const renderRow = (s, extraClass = "") => {
            const badge = STATE_BADGE[s.state] || `<span class="badge">${s.state}</span>`;
            const prem  = s.premium_collected ? money(s.premium_collected) : "—";
            const rpnl  = s.realized_pnl
              ? `<span class="${cls(s.realized_pnl)}">${signed(s.realized_pnl)}</span>` : "—";
            return `<tr class="${extraClass}">
              <td class="sym">${s.symbol}</td>
              <td>${badge}</td>
              <td class="mono">${prem}</td>
              <td class="mono">${rpnl}</td>
            </tr>`;
          };
          let rows = active.map((s) => renderRow(s)).join("");
          if (orphaned.length) {
            rows += `<tr class="divider"><td colspan="4">Monitoring only · outside current universe</td></tr>`;
            rows += orphaned.map((s) => renderRow(s, "orphaned")).join("");
          }
          $("wheel-table").innerHTML = `<table>
            <thead><tr>
              <th>Symbol</th><th>State</th><th>Premium</th><th>Realized P/L</th>
            </tr></thead>
            <tbody>${rows}</tbody></table>`;
        } else {
          $("wheel-table").innerHTML = `<div class="empty">No wheel symbols configured.</div>`;
        }

        // Pending orders
        const pends = d.pending_orders || [];
        if (pends.length) {
          const rows = pends.map((o) => `<tr>
            <td class="sym">${o.underlying}</td>
            <td class="${o.type === "put" ? "pos" : "neg"}">${o.type.toUpperCase()}</td>
            <td class="mono">$${o.strike.toFixed(2)}</td>
            <td class="mono">${o.expiration}</td>
            <td class="mono">$${o.limit.toFixed(2)}</td>
            <td style="color:var(--muted)">${o.status}</td>
          </tr>`).join("");
          $("pending-table").innerHTML = `<table>
            <thead><tr><th>Underlying</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Limit</th><th>Status</th></tr></thead>
            <tbody>${rows}</tbody></table>`;
          $("pending-card").style.display = "";
        } else {
          $("pending-card").style.display = "none";
        }

      }

      // Open option positions — sourced from /api/live (fetched fresh from Alpaca
      // on every request, not committed to git) since market_value/unrealized_pl
      // move continuously and would otherwise force a commit + Pages rebuild
      // on nearly every 5-min bot cycle.
      function renderLivePositions(opts) {
        if (opts && opts.length) {
          const rows = opts.map((p) => `<tr>
            <td class="sym">${p.underlying}</td>
            <td class="${p.type === "put" ? "pos" : "neg"}">${p.type.toUpperCase()}</td>
            <td class="mono">$${p.strike.toFixed(2)}</td>
            <td class="mono">${p.expiration}</td>
            <td class="mono">${p.qty}</td>
            <td class="mono ${cls(p.unrealized_pl)}">${signed(p.unrealized_pl)}</td>
          </tr>`).join("");
          $("positions-table").innerHTML = `<table>
            <thead><tr><th>Underlying</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Qty</th><th>Unreal. P/L</th></tr></thead>
            <tbody>${rows}</tbody></table>`;
          $("positions-card").style.display = "";
        } else {
          $("positions-card").style.display = "none";
        }
      }

      async function loadWheel() {
        try {
          const res = await fetch(wheelFileFor(currentAccount) + "?cb=" + Date.now(), { cache: "no-store" });
          if (!res.ok) return;
          const d = await res.json();
          renderWheel(d);
          $("updated").textContent = "Updated just now";
        } catch (e) { /* leave loading state */ }
      }

      async function loadLive() {
        try {
          const res = await fetch(
            "api/live?account=" + currentAccount + "&cb=" + Date.now(),
            { cache: "no-store" }
          );
          if (!res.ok) return;
          const d = await res.json();
          if (!d || !d.account) return;
          const a = d.account;
          $("equity").textContent = money(a.equity);
          const dc = $("dayChange");
          dc.textContent = `${signed(a.day_pl)} (${pct(a.day_pl_pct)}) today`;
          dc.className = "sub " + cls(a.day_pl);
          $("kpi-exposure").textContent = a.exposure_pct.toFixed(1) + "%";
          $("kpi-cash").textContent = money(a.cash);
          renderLivePositions(d.option_positions);
          const open = d.market_open;
          $("dot").className = "dot " + (open ? "open" : "");
          $("market").textContent = open ? "Market open" : "Market closed";
          $("updated").textContent = "Live · " + new Date(d.generated_at).toLocaleTimeString();
        } catch (e) { /* live overlay optional */ }
      }

      async function loadPrices() {
        if (!wheelSymbols.length) return;
        try {
          const res = await fetch(
            "api/prices?symbols=" + wheelSymbols.join(",") + "&cb=" + Date.now(),
            { cache: "no-store" }
          );
          if (!res.ok) return;
          const d = await res.json();
          const prices = d.prices || {};
          const rows = wheelSymbols
            .filter((sym) => prices[sym])
            .map((sym) => {
              const p = prices[sym];
              const chg = p.change_pct || 0;
              return `<tr>
                <td class="sym">${sym}</td>
                <td class="mono">${money(p.price)}</td>
                <td class="mono ${cls(chg)}">${pct(chg)}</td>
                <td class="mono spark-cell">${sparkline(p.trend)}</td>
              </tr>`;
            }).join("");
          if (rows) {
            $("prices-table").innerHTML = `<table>
              <thead><tr><th>Symbol</th><th>Price</th><th>Today</th><th>Trend</th></tr></thead>
              <tbody>${rows}</tbody></table>`;
          } else {
            $("prices-table").innerHTML = `<div class="empty">No price data yet.</div>`;
          }
        } catch (e) { /* leave previous render on transient failure */ }
      }

      async function refresh() {
        await loadWheel();
        await loadLive();
      }

      async function boot() {
        await refresh();     // populates wheelSymbols before the first price fetch
        await loadPrices();
      }

      function switchAccount(account) {
        if (account === currentAccount) return;
        currentAccount = account;
        localStorage.setItem("wheelAccount", account);
        document.querySelectorAll(".switcher-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.account === account);
        });
        // Reset to loading state so stale data from the other account doesn't
        // linger on screen while the new account's data fetches.
        wheelSymbols = [];
        $("wheel-table").innerHTML = `<div class="empty">Loading…</div>`;
        $("prices-table").innerHTML = `<div class="empty">Loading…</div>`;
        $("pending-card").style.display = "none";
        $("positions-card").style.display = "none";
        $("equity").textContent = "—";
        $("dayChange").textContent = "—";
        $("kpi-exposure").textContent = "—";
        $("kpi-premium").textContent = "—";
        $("kpi-pnl").textContent = "—";
        $("kpi-cash").textContent = "—";
        boot();
      }

      document.querySelectorAll(".switcher-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.account === currentAccount);
        btn.addEventListener("click", () => switchAccount(btn.dataset.account));
      });

      boot();
      setInterval(refresh, 30000);
      setInterval(loadPrices, 60000);

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () =>
          navigator.serviceWorker.register("sw.js").catch(() => {})
        );
      }
    </script>
  </body>
</html>
