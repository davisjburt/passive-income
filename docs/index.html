<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Davis's Passive Income Dashboard</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e10" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Portfolio" />
    <style>
      :root {
        --bg: #fafafa;
        --card: #ffffff;
        --border: #ececec;
        --text: #1a1a1a;
        --muted: #8a8a8a;
        --pos: #16a34a;
        --neg: #dc2626;
        --accent: #1a1a1a;
        --grid: #f0f0f0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e0e10;
          --card: #161618;
          --border: #262629;
          --text: #f2f2f2;
          --muted: #8c8c92;
          --pos: #4ade80;
          --neg: #f87171;
          --accent: #f2f2f2;
          --grid: #1f1f22;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.45;
      }
      .wrap {
        max-width: 880px;
        margin: 0 auto;
        padding: 32px 20px 64px;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 28px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12.5px;
        color: var(--muted);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
      }
      .dot.open {
        background: var(--pos);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--pos) 20%, transparent);
      }
      .dot.closed {
        background: var(--muted);
      }

      .hero {
        margin-bottom: 28px;
      }
      .hero .label {
        font-size: 12.5px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .hero .value {
        font-size: 40px;
        font-weight: 650;
        letter-spacing: -0.02em;
      }
      .hero .sub {
        font-size: 14px;
        margin-top: 2px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 28px;
      }
      @media (max-width: 640px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .kpi {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .kpi .label {
        font-size: 11.5px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .kpi .num {
        font-size: 19px;
        font-weight: 600;
        margin-top: 5px;
        letter-spacing: -0.01em;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .card h2 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 16px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .chart {
        width: 100%;
        height: 200px;
        display: block;
      }
      .chart-meta {
        display: flex;
        justify-content: space-between;
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 6px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13.5px;
      }
      th {
        text-align: right;
        font-weight: 500;
        color: var(--muted);
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 0 0 10px;
        border-bottom: 1px solid var(--border);
      }
      th:first-child,
      td:first-child {
        text-align: left;
      }
      td {
        padding: 11px 0;
        border-bottom: 1px solid var(--border);
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .sym {
        font-weight: 600;
      }

      .pos {
        color: var(--pos);
      }
      .neg {
        color: var(--neg);
      }
      .empty {
        color: var(--muted);
        font-size: 13.5px;
        padding: 8px 0;
      }
      .mono {
        font-variant-numeric: tabular-nums;
      }

      .foot {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px 20px;
        font-size: 12.5px;
      }
      .foot .k {
        color: var(--muted);
      }
      .foot .row {
        display: flex;
        justify-content: space-between;
      }
      .updated {
        font-size: 12px;
        color: var(--muted);
        margin-top: 28px;
        text-align: center;
      }
      .disclaimer {
        font-size: 11.5px;
        color: var(--muted);
        text-align: center;
        margin-top: 8px;
        line-height: 1.5;
      }
      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Davis's Passive Income Dashboard</h1>
        <div class="status">
          <span id="dot" class="dot"></span><span id="market">—</span>
        </div>
      </header>

      <div class="hero">
        <div class="label">Total equity</div>
        <div class="value" id="equity">—</div>
        <div class="sub" id="dayChange">—</div>
      </div>

      <div class="grid" id="kpis"></div>

      <div class="card">
        <h2>Equity</h2>
        <svg class="chart" id="chart" preserveAspectRatio="none"></svg>
        <div class="chart-meta">
          <span id="chartStart"></span><span id="chartEnd"></span>
        </div>
      </div>

      <div class="card">
        <h2>Open positions</h2>
        <div id="positions"></div>
      </div>

      <div class="card">
        <h2>Recent activity</h2>
        <div id="orders"></div>
      </div>

      <div class="card">
        <h2>Weekly reports</h2>
        <div id="reports"><div class="empty">No reports yet.</div></div>
      </div>

      <div class="card">
        <h2>Strategy &amp; risk</h2>
        <div class="foot" id="foot"></div>
      </div>

      <div class="updated" id="updated">Loading…</div>
      <div class="disclaimer">
        Paper-trading account. Automated and experimental — not investment
        advice. Past performance does not predict future results.
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const money = (n) =>
        "$" +
        Number(n).toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      const pct = (n) => (n >= 0 ? "+" : "") + Number(n).toFixed(2) + "%";
      const signed = (n) => (n >= 0 ? "+" : "−") + money(Math.abs(n));
      const cls = (n) => (n > 0 ? "pos" : n < 0 ? "neg" : "");

      function render(d) {
        const a = d.account;

        $("equity").textContent = money(a.equity);
        const dc = $("dayChange");
        dc.textContent = `${signed(a.day_pl)} (${pct(a.day_pl_pct)}) today`;
        dc.className = "sub " + cls(a.day_pl);

        const open = d.market_open;
        $("dot").className = "dot " + (open ? "open" : "closed");
        $("market").textContent = open ? "Market open" : "Market closed";

        const kpis = [
          [
            "Total P/L",
            `<span class="${cls(a.total_pl)}">${signed(a.total_pl)}</span>`,
          ],
          [
            "Total return",
            `<span class="${cls(a.total_pl)}">${pct(a.total_pl_pct)}</span>`,
          ],
          ["Cash", money(a.cash)],
          ["Positions", String(d.positions.length)],
        ];
        $("kpis").innerHTML = kpis
          .map(
            ([l, v]) =>
              `<div class="kpi"><div class="label">${l}</div><div class="num">${v}</div></div>`,
          )
          .join("");

        drawChart(d.equity_curve);

        // positions
        if (d.positions.length) {
          const rows = d.positions
            .map(
              (p) => `
      <tr>
        <td class="sym">${p.symbol}</td>
        <td class="mono">${p.qty.toFixed(4)}</td>
        <td class="mono">${money(p.avg_entry)}</td>
        <td class="mono">${money(p.current_price)}</td>
        <td class="mono">${money(p.market_value)}</td>
        <td class="mono ${cls(p.unrealized_pl)}">${signed(p.unrealized_pl)} (${pct(p.unrealized_plpc)})</td>
      </tr>`,
            )
            .join("");
          $("positions").innerHTML = `<table>
      <thead><tr><th>Symbol</th><th>Qty</th><th>Avg entry</th><th>Last</th><th>Value</th><th>Unrealized P/L</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
        } else {
          $("positions").innerHTML =
            `<div class="empty">No open positions — fully in cash.</div>`;
        }

        // orders
        const filled = d.orders.filter(
          (o) => o.status === "filled" || o.filled_at,
        );
        if (filled.length) {
          const rows = filled
            .slice(0, 12)
            .map((o) => {
              const when = o.filled_at || o.submitted_at;
              const date = when
                ? new Date(when).toLocaleString("en-US", {
                    month: "short",
                    day: "numeric",
                    hour: "numeric",
                    minute: "2-digit",
                  })
                : "—";
              const side = o.side.toUpperCase();
              const sc = side === "BUY" ? "pos" : "neg";
              const amt = o.filled_avg_price
                ? money(o.filled_avg_price)
                : o.notional
                  ? money(o.notional)
                  : "—";
              return `<tr>
        <td class="sym">${o.symbol}</td>
        <td class="${sc}">${side}</td>
        <td class="mono">${o.qty ? o.qty.toFixed(4) : "—"}</td>
        <td class="mono">${amt}</td>
        <td class="mono" style="color:var(--muted)">${date}</td>
      </tr>`;
            })
            .join("");
          $("orders").innerHTML = `<table>
      <thead><tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th><th>When</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
        } else {
          $("orders").innerHTML = `<div class="empty">No trades yet.</div>`;
        }

        // strategy + risk
        const s = d.strategy,
          r = d.risk;
        const foot = [
          ["Strategy", s.name],
          ["Universe", s.universe.join(" · ")],
          ["Buy / sell RSI(2)", `&lt; ${s.rsi_entry} / &gt; ${s.rsi_exit}`],
          ["Trend filter", `price &gt; ${s.trend_sma}d SMA`],
          ["Max positions", r.max_positions],
          ["Max position size", r.max_position_pct * 100 + "%"],
          ["Cash buffer", r.cash_buffer_pct * 100 + "%"],
          ["Stop-loss", r.stop_loss_pct * 100 + "%"],
          ["Daily-loss halt", r.daily_loss_halt_pct * 100 + "%"],
        ];
        $("foot").innerHTML = foot
          .map(
            ([k, v]) =>
              `<div class="row"><span class="k">${k}</span><span>${v}</span></div>`,
          )
          .join("");

        const gen = new Date(d.generated_at);
        $("updated").textContent = "Updated " + gen.toLocaleString();
      }

      async function loadReports() {
        try {
          const res = await fetch("reports/index.json?cb=" + Date.now(), {
            cache: "no-store",
          });
          if (!res.ok) return;
          const list = await res.json();
          if (!list.length) return;
          const rows = list
            .slice(0, 12)
            .map((r) => {
              const sign = r.week_return_pct >= 0 ? "pos" : "neg";
              return `<tr>
        <td><a href="reports/${r.file}">Week ending ${r.week_ending}</a></td>
        <td class="mono">${r.num_trades} trades</td>
        <td class="mono ${sign}">${(r.week_return_pct >= 0 ? "+" : "") + r.week_return_pct.toFixed(2)}%</td>
        <td class="mono ${cls(r.realized_pl)}">${signed(r.realized_pl)}</td>
      </tr>`;
            })
            .join("");
          $("reports").innerHTML = `<table>
      <thead><tr><th>Report</th><th>Trades</th><th>Return</th><th>Realized P&L</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
        } catch (e) {
          /* leave default empty state */
        }
      }

      function drawChart(curve) {
        const svg = $("chart");
        const W = 800,
          H = 200,
          pad = 6;
        svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
        if (!curve || curve.length < 2) {
          svg.innerHTML = `<text x="${W / 2}" y="${H / 2}" text-anchor="middle" fill="var(--muted)" font-size="13">Not enough history yet</text>`;
          $("chartStart").textContent = "";
          $("chartEnd").textContent = "";
          return;
        }
        const ys = curve.map((p) => p.equity);
        let min = Math.min(...ys),
          max = Math.max(...ys);
        if (min === max) {
          min -= 1;
          max += 1;
        }
        const x = (i) => pad + (i / (curve.length - 1)) * (W - 2 * pad);
        const y = (v) => pad + (1 - (v - min) / (max - min)) * (H - 2 * pad);

        let line = "",
          area = "";
        curve.forEach((p, i) => {
          const px = x(i).toFixed(1),
            py = y(p.equity).toFixed(1);
          line += (i ? "L" : "M") + px + " " + py + " ";
        });
        const up = curve[curve.length - 1].equity >= curve[0].equity;
        const color = up ? "var(--pos)" : "var(--neg)";
        area =
          `M${x(0).toFixed(1)} ${(H - pad).toFixed(1)} ` +
          curve
            .map((p, i) => "L" + x(i).toFixed(1) + " " + y(p.equity).toFixed(1))
            .join(" ") +
          ` L${x(curve.length - 1).toFixed(1)} ${(H - pad).toFixed(1)} Z`;

        svg.innerHTML = `
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#g)"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>`;
        $("chartStart").textContent = curve[0].t;
        $("chartEnd").textContent = curve[curve.length - 1].t;
      }

      let baseData = null; // committed snapshot (chart, history, strategy, risk)

      async function load() {
        try {
          const res = await fetch("data.json?cb=" + Date.now(), {
            cache: "no-store",
          });
          if (!res.ok) throw new Error(res.status);
          baseData = await res.json();
          render(baseData);
          loadLive(); // try to overlay live numbers on top
        } catch (e) {
          $("updated").textContent =
            "Could not load data.json (" + e.message + ")";
        }
      }

      // Overlay live account/positions from the /api/live function, if available
      // (Cloudflare Pages). On plain GitHub Pages it 404s and we keep the snapshot.
      async function loadLive() {
        if (!baseData) return;
        try {
          const res = await fetch("api/live?cb=" + Date.now(), {
            cache: "no-store",
          });
          if (!res.ok) return;
          const d = await res.json();
          if (!d || !d.account) return;
          const m = JSON.parse(JSON.stringify(baseData));
          const eq = d.account.equity;
          m.account.equity = eq;
          m.account.cash = d.account.cash;
          m.account.buying_power = d.account.buying_power;
          m.account.portfolio_value = d.account.portfolio_value;
          m.account.last_equity = d.account.last_equity;
          m.account.day_pl = d.account.day_pl;
          m.account.day_pl_pct = d.account.day_pl_pct;
          const baseline =
            baseData.equity_curve && baseData.equity_curve.length
              ? baseData.equity_curve[0].equity
              : eq;
          m.account.total_pl = eq - baseline;
          m.account.total_pl_pct = baseline
            ? ((eq - baseline) / baseline) * 100
            : 0;
          // Extend the equity curve with the live point so the chart moves intraday.
          if (m.equity_curve && m.equity_curve.length) {
            const today = d.generated_at.slice(0, 10);
            const last = m.equity_curve[m.equity_curve.length - 1];
            if (last.t === today) last.equity = eq;
            else m.equity_curve.push({ t: today, equity: eq });
          }
          m.positions = d.positions;
          m.market_open = d.market_open;
          m.generated_at = d.generated_at;
          render(m);
          $("updated").textContent =
            "Live · updated " + new Date(d.generated_at).toLocaleTimeString();
        } catch (e) {
          /* keep snapshot */
        }
      }

      load();
      loadReports();
      setInterval(load, 30000); // refresh while the page is open

      // Register the service worker so the dashboard installs as a PWA.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () =>
          navigator.serviceWorker.register("sw.js").catch(() => {}),
        );
      }
    </script>
  </body>
</html>
