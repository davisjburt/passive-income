name = "wheel-cron"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Cloudflare cron triggers run in UTC. Every 15 min during ~US market hours
# (13-21 UTC covers both EDT and EST). The wheel workflow no-ops if the market
# is closed and is idempotent against pending orders, so extra pokes are safe.
[triggers]
crons = ["*/15 13-21 * * 1-5"]
